<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
</head>
<body>
    <div class="topBar">
        <div class="pageTitle">Library</div>
        <button class="addBtn">+ Add New</button>
    </div>
    <div class="container">
    </div>
    <dialog class="addModal">
        <div class="modalContainer">
            <div class="cardTopBtns">
                <button class="closeBtn">×</button>
            </div>
        <form>
            <input type="text" id="form-title" placeholder="Book Title">
            <input type="text" id="form-author" placeholder="Author">
            <input type="text" id="form-pages" placeholder="No. of Pages">
            <input type="text" id="form-read" placeholder="Read/Not Read Yet">
        </form>
        <div class="modalBtns">
            <button class="addBookBtn">Add Book</button>
        </div>
        </div>
    </dialog>
</body>
</html>
