<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
</head>
<body>
    <button class="addBtn">+ Add New</button>
    <div class="container">
    </div>
    <dialog class="addModal">
        <form>
            <label for="#form-title">Title:</label>
            <input type="text" id="form-title" placeholder="E.x. Harry Potter">
            <label for="#form-author">Author:</label>
            <input type="text" id="form-author" placeholder="E.x. J.K Rowling">
            <label for="#form-pages">No. of pages:</label>
            <input type="text" id="form-pages" placeholder="E.x. 405">
            <label for="#form-read">Read</label>
            <input type="text" id="form-read" placeholder="Read/Not Read Yet">
        </form>
        <div class="modalBtns">
            <button class="closeBtn">Close</button>
            <button class="addBookBtn">Add Book</button>
        </div>
    </dialog>
</body>
</html>
